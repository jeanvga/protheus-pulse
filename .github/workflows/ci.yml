name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore frontend
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - name: Test and build frontend
        run: |
          npm run ui:test
          npm run ui:build

      - name: Restore backend
        run: dotnet restore ProtheusPulse.sln

      - name: Build backend
        run: dotnet build ProtheusPulse.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test ProtheusPulse.sln --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end test
        run: npm run ui:e2e

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem .\scripts\*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            foreach ($parseError in $errors) {
              Write-Error ('{0}: {1}' -f $_.FullName, $parseError.Message)
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Publish self-contained Windows package
        shell: pwsh
        run: |
          $packageRoot = '.\artifacts\protheus-pulse-0.1.2-win-x64'
          dotnet clean .\src\ProtheusPulse.Service --configuration Release --runtime win-x64
          dotnet publish .\src\ProtheusPulse.Service --configuration Release --runtime win-x64 --self-contained true --output "$packageRoot\app" /p:SkipFrontendBuild=true /p:Version=0.1.2 /p:ContinuousIntegrationBuild=true /p:DebugType=None /p:DebugSymbols=false
          Copy-Item .\scripts\install-service.ps1, .\scripts\install.cmd, .\scripts\uninstall-service.ps1, .\docs\PILOT-CHECKLIST.md, .\LICENSE -Destination $packageRoot
          Compress-Archive -LiteralPath $packageRoot -DestinationPath "$packageRoot.zip" -CompressionLevel Optimal
          $hash = (Get-FileHash -LiteralPath "$packageRoot.zip" -Algorithm SHA256).Hash
          [IO.File]::WriteAllText("$packageRoot.zip.sha256", "$hash  protheus-pulse-0.1.2-win-x64.zip`r`n")

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            playwright-report/
          if-no-files-found: ignore

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: protheus-pulse-win-x64
          path: |
            artifacts/protheus-pulse-0.1.2-win-x64.zip
            artifacts/protheus-pulse-0.1.2-win-x64.zip.sha256
