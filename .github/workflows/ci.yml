name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate version
        shell: pwsh
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          [xml]$props = Get-Content -LiteralPath .\Directory.Build.props
          $version = [string]$props.Project.PropertyGroup.Version
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Versão inválida em Directory.Build.props: $version"
          }
          $expectedTag = "v$version"
          if ($env:REF_TYPE -eq 'tag' -and $env:REF_NAME -ne $expectedTag) {
            throw "A tag $env:REF_NAME não corresponde à versão $version ($expectedTag)."
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore frontend
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - name: Test and build frontend
        run: |
          npm run ui:test
          npm run ui:build

      - name: Restore backend
        run: dotnet restore ProtheusPulse.sln

      - name: Audit backend dependencies
        shell: pwsh
        run: |
          $output = dotnet list ProtheusPulse.sln package --vulnerable --include-transitive
          $output | Write-Output
          if ($LASTEXITCODE -ne 0 -or $output -match 'has the following vulnerable packages') {
            throw "Foram encontradas dependências NuGet vulneráveis."
          }

      - name: Build backend
        run: dotnet build ProtheusPulse.sln --configuration Release --no-restore

      - name: Test backend
        run: dotnet test ProtheusPulse.sln --configuration Release --no-build --logger "trx;LogFileName=tests.trx"

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end test
        run: npm run ui:e2e

      - name: Validate PowerShell installer syntax
        shell: pwsh
        run: |
          $failed = $false
          Get-ChildItem .\scripts\*.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            foreach ($parseError in $errors) {
              Write-Error ('{0}: {1}' -f $_.FullName, $parseError.Message)
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

      - name: Publish self-contained Windows package
        shell: pwsh
        run: |
          $version = $env:APP_VERSION
          $packageRoot = ".\artifacts\protheus-pulse-$version-win-x64"
          dotnet clean .\src\ProtheusPulse.Service --configuration Release --runtime win-x64
          dotnet publish .\src\ProtheusPulse.Service --configuration Release --runtime win-x64 --self-contained true --output "$packageRoot\app" /p:SkipFrontendBuild=true "/p:Version=$version" /p:ContinuousIntegrationBuild=true /p:DebugType=None /p:DebugSymbols=false
          Copy-Item .\scripts\install-service.ps1, .\scripts\install.cmd, .\scripts\uninstall-service.ps1, .\docs\DEPLOYMENT-CHECKLIST.md, .\LICENSE -Destination $packageRoot
          Compress-Archive -LiteralPath $packageRoot -DestinationPath "$packageRoot.zip" -CompressionLevel Optimal
          $hash = (Get-FileHash -LiteralPath "$packageRoot.zip" -Algorithm SHA256).Hash
          [IO.File]::WriteAllText("$packageRoot.zip.sha256", "$hash  protheus-pulse-$version-win-x64.zip`r`n")

      - name: Install verified Inno Setup compiler
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP 'innosetup-6.7.3.exe'
          Invoke-WebRequest 'https://github.com/jrsoftware/issrc/releases/download/is-6_7_3/innosetup-6.7.3.exe' -OutFile $installer
          $expectedHash = '9C73C3BAE7ED48D44112A0F48E66742C00090BDB5BEF71D9D3C056C66E97B732'
          $actualHash = (Get-FileHash -LiteralPath $installer -Algorithm SHA256).Hash
          if ($actualHash -ne $expectedHash) {
            throw "Hash inesperado do Inno Setup: $actualHash"
          }
          $signature = Get-AuthenticodeSignature -LiteralPath $installer
          if ($signature.Status -ne 'Valid' -or $signature.SignerCertificate.Subject -notmatch 'Pyrsys B\.V\.') {
            throw "Assinatura Authenticode inválida do Inno Setup: $($signature.Status)"
          }
          $process = Start-Process -FilePath $installer -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART', '/SP-' -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Instalação do compilador Inno Setup falhou: $($process.ExitCode)"
          }

      - name: Compile single-file Windows installer
        shell: pwsh
        run: |
          $version = $env:APP_VERSION
          $packageRoot = (Resolve-Path ".\artifacts\protheus-pulse-$version-win-x64").Path
          $outputRoot = (Resolve-Path '.\artifacts').Path
          $compiler = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $compiler "/DMyAppVersion=$version" "/DSourceDirectory=$packageRoot\app" "/DOutputDirectory=$outputRoot" .\installer\ProtheusPulse.iss
          if ($LASTEXITCODE -ne 0) {
            throw "O Inno Setup falhou com código $LASTEXITCODE."
          }
          $setup = Join-Path $outputRoot "protheus-pulse-$version-win-x64-setup.exe"
          $hash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash
          [IO.File]::WriteAllText("$setup.sha256", "$hash  $([IO.Path]::GetFileName($setup))`r`n")

      - name: Smoke test setup.exe and Windows service
        shell: pwsh
        run: |
          $version = $env:APP_VERSION
          $setup = (Resolve-Path ".\artifacts\protheus-pulse-$version-win-x64-setup.exe").Path
          $installLog = Join-Path $env:RUNNER_TEMP 'protheus-pulse-setup.log'
          $installRoot = Join-Path $env:ProgramFiles 'Protheus Pulse'
          $dataRoot = Join-Path $env:ProgramData 'ProtheusPulse'
          $uninstallExitCode = $null
          $installerCompleted = $false
          $serviceSurvivedUninstall = $false
          try {
            $installArguments = @(
              '/VERYSILENT'
              '/SUPPRESSMSGBOXES'
              '/NORESTART'
              '/SP-'
              ('/LOG="{0}"' -f $installLog)
            )
            $installProcess = Start-Process -FilePath $setup -ArgumentList $installArguments -Wait -PassThru
            if ($installProcess.ExitCode -ne 0) {
              throw "setup.exe retornou $($installProcess.ExitCode)"
            }
            $installerCompleted = $true
            $service = Get-CimInstance Win32_Service -Filter "Name='ProtheusPulse'"
            if ($service.State -ne 'Running' -or $service.StartName -notmatch 'LocalSystem') {
              throw "Serviço instalado em estado ou conta inesperados."
            }
            if ($service.PathName -ne ('"' + (Join-Path $installRoot 'ProtheusPulse.Service.exe') + '"')) {
              throw "ImagePath inesperado: $($service.PathName)"
            }
            $response = Invoke-WebRequest 'http://127.0.0.1:5058/health/ready' -UseBasicParsing -TimeoutSec 10
            if ($response.StatusCode -ne 200) {
              throw "Health check retornou HTTP $($response.StatusCode)."
            }
          }
          catch {
            Get-Content -LiteralPath $installLog -Tail 120 -ErrorAction SilentlyContinue
            Get-Content -LiteralPath (Join-Path $dataRoot 'logs\install-diagnostics.txt') -Tail 160 -ErrorAction SilentlyContinue
            throw
          }
          finally {
            $uninstaller = Join-Path $installRoot 'unins000.exe'
            if ($installerCompleted -and (Test-Path -LiteralPath $uninstaller)) {
              $uninstallProcess = Start-Process -FilePath $uninstaller -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait -PassThru
              $uninstallExitCode = $uninstallProcess.ExitCode
            }
            if (Get-Service -Name ProtheusPulse -ErrorAction SilentlyContinue) {
              $serviceSurvivedUninstall = $true
              sc.exe stop ProtheusPulse | Out-Null
              sc.exe delete ProtheusPulse | Out-Null
            }
            if (Test-Path -LiteralPath $dataRoot) {
              Remove-Item -LiteralPath $dataRoot -Recurse -Force
            }
          }
          if ($null -eq $uninstallExitCode -or $uninstallExitCode -ne 0) {
            throw "O desinstalador não concluiu corretamente: $uninstallExitCode"
          }
          if ($serviceSurvivedUninstall) {
            throw 'O serviço permaneceu registrado após a desinstalação.'
          }

      - name: Upload failed test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/TestResults/*.trx
            playwright-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload manual Windows package
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: protheus-pulse-win-x64
          path: |
            artifacts/protheus-pulse-${{ env.APP_VERSION }}-win-x64.zip
            artifacts/protheus-pulse-${{ env.APP_VERSION }}-win-x64.zip.sha256
            artifacts/protheus-pulse-${{ env.APP_VERSION }}-win-x64-setup.exe
            artifacts/protheus-pulse-${{ env.APP_VERSION }}-win-x64-setup.exe.sha256
          retention-days: 1

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = $env:APP_VERSION
          $tag = $env:GITHUB_REF_NAME
          $assets = @(
            ".\artifacts\protheus-pulse-$version-win-x64.zip",
            ".\artifacts\protheus-pulse-$version-win-x64.zip.sha256",
            ".\artifacts\protheus-pulse-$version-win-x64-setup.exe",
            ".\artifacts\protheus-pulse-$version-win-x64-setup.exe.sha256"
          )
          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:GITHUB_REPOSITORY --verify-tag `
              --title "Protheus Pulse $version" --generate-notes
            if ($LASTEXITCODE -ne 0) { throw "Falha ao criar release $tag" }
          }
          gh release upload $tag $assets --clobber --repo $env:GITHUB_REPOSITORY
          if ($LASTEXITCODE -ne 0) { throw "Falha ao publicar os instaladores." }
